<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berry AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#05070a;
color:white;
}

/* glow */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, rgba(0,255,170,0.25), transparent 45%),
radial-gradient(circle at 80% 60%, rgba(0,140,255,0.25), transparent 45%),
radial-gradient(circle at 50% 90%, rgba(0,255,255,0.15), transparent 50%);
filter:blur(60px);
z-index:-2;
}

/* particles */
.particle{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
background:rgba(0,255,200,0.7);
box-shadow:0 0 10px rgba(0,255,200,0.8);
animation:float linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);opacity:0;}
10%{opacity:1;}
to{transform:translateY(-10vh);opacity:0;}
}

/* BOOT */
#boot{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.bootTitle{
font-size:28px;
font-weight:800;
background:linear-gradient(90deg,#00ffcc,#0099ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.bootText{
font-size:12px;
opacity:.8;
}

/* HOME */
#home{
display:none;
height:100vh;
flex-direction:column;
justify-content:center;
align-items:center;
gap:12px;
}

.title{
font-size:30px;
font-weight:800;
background:linear-gradient(90deg,#00ffcc,#0099ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
padding:14px 28px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:800;
color:white;
background:linear-gradient(135deg,#00ffcc,#0099ff);
}

/* CHAT */
#chatApp{
display:none;
height:100vh;
flex-direction:column;
}

header{
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.chat{
flex:1;
overflow:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:12px;
border-radius:14px;
white-space:pre-wrap;
line-height:1.4;
}

.user{
align-self:flex-end;
background:rgba(255,255,255,0.08);
}

.bot{
align-self:flex-start;
background:rgba(0,255,200,0.12);
border:1px solid rgba(255,255,255,0.08);
}

.inputBar{
display:flex;
gap:10px;
padding:14px;
border-top:1px solid rgba(255,255,255,0.08);
}

input{
flex:1;
padding:12px;
border-radius:12px;
border:none;
outline:none;
background:rgba(255,255,255,0.06);
color:white;
}

.smallBtn{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
background:rgba(255,255,255,0.12);
color:white;
}
</style>
</head>

<body>

<!-- PARTICLES -->
<script>
for(let i=0;i<30;i++){
const p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(4+Math.random()*6)+"s";
document.body.appendChild(p);
}
</script>

<!-- BOOT -->
<div id="boot">
<div class="bootTitle">BERRY AI</div>
<div class="bootText" id="bootText">starting up...</div>
</div>

<!-- HOME -->
<div id="home">
<div class="title">READY</div>
<button class="btn" onclick="enter()">ENTER</button>
</div>

<!-- CHAT -->
<div id="chatApp">

<header>
<div>🍓 BERRY AI</div>
<button class="smallBtn" onclick="stopGeneration()">Stop</button>
</header>

<div class="chat" id="chat"></div>

<div class="inputBar">
<input id="input" placeholder="Ask Berry AI..." />
<button class="btn" onclick="send()" id="sendBtn">Send</button>
</div>

</div>

<script>

//////////////////////////////////////////////////////
// 🧠 AI BEHAVIOR CONFIG (EDIT THIS SECTION ONLY)
//////////////////////////////////////////////////////

const AI_CONFIG = {

name: "Berry AI",

tone: "friendly and casual", 
// friendly | serious | funny | strict | chill

personality: `
You are Berry AI, a helpful AI assistant created by Yuyang, a boy. He is a middle schooler. You can help with lots of stuff.
You speak like a normal person, not robotic or sci-fi.
Keep answers clear, simple, and natural. Don't overspeak. Don't be cringe.
`,

rules: `
- Do not act like a system or robot
- Avoid overly technical language unless asked
- Be helpful and conversational
- Keep responses not too long
- Don't be cringe
- Don't overspeak
`,

responseLength: "medium"
// short | medium | long
};

//////////////////////////////////////////////////////

const API_KEY = "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";
const MODEL = "openai/gpt-oss-20b";

let messages=[
{
role:"system",
content:`
Name: ${AI_CONFIG.name}
Tone: ${AI_CONFIG.tone}

Personality:
${AI_CONFIG.personality}

Rules:
${AI_CONFIG.rules}

Response length: ${AI_CONFIG.responseLength}
`
}
];

let isGenerating=false;
let stop=false;
let typingInterval=null;

const chat=document.getElementById("chat");
const input=document.getElementById("input");
const sendBtn=document.getElementById("sendBtn");

/* BOOT */
const bootLines=["starting up...","getting things ready...","loading AI...","100%."];
let i=0;
function boot(){
document.getElementById("bootText").textContent=bootLines[i];
i++;
if(i<bootLines.length){
setTimeout(boot,600);
}else{
setTimeout(()=>{
document.getElementById("boot").style.display="none";
document.getElementById("home").style.display="flex";
},600);
}
}
boot();

function enter(){
document.getElementById("home").style.display="none";
document.getElementById("chatApp").style.display="flex";
}

function add(text,type){
const d=document.createElement("div");
d.className="msg "+type;
d.textContent=text;
chat.appendChild(d);
chat.scrollTop=999999;
return d;
}

/* STOP */
function stopGeneration(){
stop=true;

if(typingInterval){
clearInterval(typingInterval);
typingInterval=null;
}

isGenerating=false;
sendBtn.disabled=false;
input.disabled=false;
}

/* TYPE */
function typeText(el,text,speed=12){

return new Promise(res=>{
el.textContent="";
let i=0;
stop=false;

typingInterval=setInterval(()=>{
if(stop){
clearInterval(typingInterval);
typingInterval=null;
res();
return;
}

el.textContent+=text[i];
i++;

if(i>=text.length){
clearInterval(typingInterval);
typingInterval=null;
res();
}
},speed);
});
}

/* SEND */
async function send(){

if(isGenerating) return;

const text=input.value.trim();
if(!text) return;

add(text,"user");
messages.push({role:"user",content:text});
input.value="";

isGenerating=true;
sendBtn.disabled=true;
input.disabled=true;

const load=add("thinking...","bot");

try{

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:MODEL,
messages
})
});

const data=await res.json();
const reply=data.choices?.[0]?.message?.content || "Error.";

load.remove();

const bot=add("","bot");
await typeText(bot,reply);

messages.push({role:"assistant",content:reply});

}catch(e){
load.textContent="connection error.";
console.log(e);
}

isGenerating=false;
sendBtn.disabled=false;
input.disabled=false;
}

document.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

</script>

</body>
</html>
