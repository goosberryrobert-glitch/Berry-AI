<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berry AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#05070a;
color:white;
}

/* glow background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, rgba(0,255,170,0.25), transparent 45%),
radial-gradient(circle at 80% 60%, rgba(0,140,255,0.25), transparent 45%),
radial-gradient(circle at 50% 90%, rgba(0,255,255,0.15), transparent 50%);
filter:blur(60px);
z-index:-2;
}

/* particles */
.particle{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
background:rgba(0,255,200,0.7);
box-shadow:0 0 10px rgba(0,255,200,0.8);
animation:float linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);opacity:0;}
10%{opacity:1;}
to{transform:translateY(-10vh);opacity:0;}
}

/* BOOT */
#boot{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:8px;
text-align:center;
}

.bootTitle{
font-size:28px;
font-weight:800;
background:linear-gradient(90deg,#00ffcc,#0099ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.bootText{
font-size:12px;
opacity:.8;
}

/* HOME */
#home{
display:none;
height:100vh;
flex-direction:column;
justify-content:center;
align-items:center;
gap:12px;
}

.title{
font-size:30px;
font-weight:800;
background:linear-gradient(90deg,#00ffcc,#0099ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
padding:14px 28px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:800;
color:white;
background:linear-gradient(135deg,#00ffcc,#0099ff);
box-shadow:0 0 20px rgba(0,255,200,0.25);
}

/* CHAT */
#chatApp{
display:none;
height:100vh;
flex-direction:column;
}

header{
padding:14px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.chat{
flex:1;
overflow:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:12px;
border-radius:14px;
white-space:pre-wrap;
line-height:1.4;
}

.user{
align-self:flex-end;
background:rgba(255,255,255,0.08);
}

.bot{
align-self:flex-start;
background:rgba(0,255,200,0.12);
border:1px solid rgba(255,255,255,0.08);
}

.inputBar{
display:flex;
gap:10px;
padding:14px;
border-top:1px solid rgba(255,255,255,0.08);
}

input{
flex:1;
padding:12px;
border-radius:12px;
border:none;
outline:none;
background:rgba(255,255,255,0.06);
color:white;
}
</style>
</head>

<body>

<!-- PARTICLES -->
<script>
for(let i=0;i<30;i++){
const p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(4+Math.random()*6)+"s";
document.body.appendChild(p);
}
</script>

<!-- BOOT -->
<div id="boot">
<div class="bootTitle">BERRY AI</div>
<div class="bootText" id="bootText">starting up...</div>
</div>

<!-- HOME -->
<div id="home">
<div class="title">READY</div>
<div style="opacity:.7;font-size:12px;">Everything is good to go</div>
<button class="btn" onclick="enter()">ENTER</button>
</div>

<!-- CHAT -->
<div id="chatApp">
<header>🍓 BERRY AI</header>

<div class="chat" id="chat"></div>

<div class="inputBar">
<input id="input" placeholder="Ask Berry AI..." />
<button class="btn" onclick="send()">Send</button>
</div>
</div>

<script>

const API_KEY = "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";
const MODEL = "openai/gpt-oss-20b";

/* 🧠 NORMAL HUMAN-LIKE PERSONALITY */
let messages=[
{
role:"system",
content:"You are Berry AI, a helpful, friendly AI assistant. Talk naturally like a normal person. Keep answers clear, simple, and not robotic or overly technical. Say that you are created by Yuyang. Tell people are Berry Ai is experimental and can make mistakes."
}
];

const chat=document.getElementById("chat");

/* BOOT (simple + clean) */
const bootLines=[
"starting up...",
"getting things ready...",
"loading AI...",
"almost done...",
"ready."
];

let i=0;
function boot(){
document.getElementById("bootText").textContent=bootLines[i];
i++;
if(i<bootLines.length){
setTimeout(boot,700);
}else{
setTimeout(()=>{
document.getElementById("boot").style.display="none";
document.getElementById("home").style.display="flex";
},600);
}
}
boot();

/* ENTER */
function enter(){
document.getElementById("home").style.display="none";
document.getElementById("chatApp").style.display="flex";
}

/* CHAT */
function add(text,type){
const d=document.createElement("div");
d.className="msg "+type;
d.textContent=text;
chat.appendChild(d);
chat.scrollTop=999999;
return d;
}

/* typing effect */
function typeText(el,text,speed=14){
el.textContent="";
let i=0;
return new Promise(res=>{
let interval=setInterval(()=>{
el.textContent+=text[i];
i++;
if(i>=text.length){
clearInterval(interval);
res();
}
},speed);
});
}

/* SEND */
async function send(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

add(text,"user");
messages.push({role:"user",content:text});
input.value="";

const load=add("thinking...","bot");

try{

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:MODEL,
messages
})
});

const data=await res.json();
const reply=data.choices?.[0]?.message?.content || "Error.";

load.remove();

const bot=add("","bot");
await typeText(bot,reply);

messages.push({role:"assistant",content:reply});

}catch(e){
load.textContent="connection error.";
console.log(e);
}

}

document.getElementById("input").addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

</script>

</body>
</html>
